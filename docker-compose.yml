services:
  api:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.backend
    image: medicineai-api:local
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MEDICINEAI_CORS_ORIGINS: ${MEDICINEAI_CORS_ORIGINS:-http://localhost:8501,http://127.0.0.1:8501}
    command:
      - uvicorn
      - medicineai.api.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.frontend
    image: medicineai-ui:local
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_URL: http://api:8000
    command:
      - streamlit
      - run
      - MedicineAI.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.headless=true
      - --browser.gatherUsageStats=false
    depends_on:
      api:
        condition: service_healthy
